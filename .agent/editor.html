  <!-- Interactive Micro-interactions -->
  <script>
    document.querySelectorAll('button, select, input[type="range"]').forEach(el => {
      el.addEventListener('mousedown', () => el.classList.add('scale-95'))
      el.addEventListener('mouseup', () => el.classList.remove('scale-95'))
      el.addEventListener('mouseleave', () => el.classList.remove('scale-95'))
    })

    // Simple switch toggle effect
    const toggleBtn = document.querySelector('aside button.w-10')
    if (toggleBtn) {
      toggleBtn.addEventListener('click', () => {
        const knob = toggleBtn.querySelector('span')
        if (toggleBtn.classList.contains('bg-primary')) {
          toggleBtn.classList.remove('bg-primary')
          toggleBtn.classList.add('bg-slate-300')
          knob.style.right = 'auto'
          knob.style.left = '4px'
        } else {
          toggleBtn.classList.add('bg-primary')
          toggleBtn.classList.remove('bg-slate-300')
          knob.style.left = 'auto'
          knob.style.right = '4px'
        }
      })
    }
  </script>
